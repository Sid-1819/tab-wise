name: Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much as you can — it helps us fix issues faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: e.g. Sessions fail to restore when tabs are pinned
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open Tab Wise side panel
        2. Save a session with pinned tabs
        3. Restore the session
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images or paste a link

  - type: dropdown
    id: chrome-version
    attributes:
      label: Chrome version
      options:
        - Stable
        - Beta
        - Dev
        - Canary
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Tab Wise version
      description: Found on chrome://extensions (e.g. 2.3.0)
      placeholder: "2.3.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - ChromeOS
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Console errors, related issues, or anything else helpful
