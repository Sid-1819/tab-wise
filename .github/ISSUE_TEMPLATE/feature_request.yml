name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Tab Wise? We'd love to hear it. Check [NEXT_LEVEL_FEATURES.md](https://github.com/Sid-1819/tab-wise/blob/main/NEXT_LEVEL_FEATURES.md) and existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow would it improve?
      placeholder: e.g. I often lose track of tabs I closed accidentally and want a faster way to recover them
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've thought about

  - type: dropdown
    id: willing-to-contribute
    attributes:
      label: Would you like to work on this?
      options:
        - "Yes, I'd like to submit a PR"
        - "Maybe, with some guidance"
        - "No, just suggesting"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, or related discussions
